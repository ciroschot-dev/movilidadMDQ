<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovilidadMDQ - Demo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Cargamos la configuración primero -->
    <script src="env.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-info">
                <h1>MovilidadMDQ</h1>
                <p>Compara y viaja mejor</p>
            </div>
            <div class="avatar">🇦🇷</div>
        </header>

        <section class="form-section">
            <form id="viajeForm">
                <div class="input-group">
                    <i data-lucide="map-pin"></i>
                    <input type="text" id="origen" placeholder="¿De dónde sales?" required>
                </div>
                <div class="input-group">
                    <i data-lucide="navigation"></i>
                    <input type="text" id="destino" placeholder="¿A dónde vas?" required>
                </div>
                <button type="submit" id="btnCalcular">CALCULAR</button>
            </form>
        </section>

        <div id="resultadosContainer">
            <div class="placeholder-text" id="mensajeEstado">
                Ingresa tu ruta para ver opciones
            </div>
            <div id="listaResultados"></div>
        </div>

        <footer>
            <p>Precios estimados basados en la tarifa actual.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
